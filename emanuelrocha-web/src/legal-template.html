<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#dad2ce">
    <meta name="robots" content="noindex, follow">
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="canonical" href="{{CANONICAL}}">
    <link rel="alternate" hreflang="ca" href="https://emanuelrocha.cat/ca/legal/">
    <link rel="alternate" hreflang="es" href="https://emanuelrocha.cat/es/legal/">
    <link rel="alternate" hreflang="x-default" href="https://emanuelrocha.cat/ca/legal/">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css?v={{ASSET_VERSION}}">
    <script type="module" src="/assets/legal.js?v={{ASSET_VERSION}}"></script>
</head>
<body class="legal-page">
    <a class="visually-hidden skip-link" href="#legal-content">{{SKIP_TEXT}}</a>
    <div class="legal-shell">
        <header class="legal-header"><a class="brand-title" href="{{HOME_URL}}">Emanuel Rocha</a><p class="tag-line">{{TAG}}</p></header>
        <main class="legal-scroll" id="legal-content" tabindex="-1">
            <h1>{{HEADING}}</h1>
            {{LEGAL_CONTENT}}
            <p class="legal-updated">{{UPDATED}}</p>
        </main>
        <footer class="legal-footer">
            <button type="button" class="meta-text" id="legal-back" data-fallback="{{HOME_URL}}">{{BACK}}</button>
            <a class="meta-text" href="{{HOME_URL}}">{{HOME}}</a>
            <a class="meta-text" href="{{ALTERNATE_URL}}" hreflang="{{ALTERNATE_LANG}}">{{LANGUAGE}}</a>
        </footer>
    </div>
</body>
</html>
